{%extends 'medicare/base.html'%}

{%block title%}{{action}} Billing - Medicare{%endblock%}

{%block content%}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h2 fw-bold"><i class="fas fa-file-invoice-dollar text-primary"></i> {{action}} Billing</h1>
    <a href="{%url 'billing_list'%}" class="btn btn-secondary">
        <i class="fas fa-arrow-left me-2"></i>Back
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {%csrf_token%}
            <div class="row">
                {%for field in form%}
                <div class="col-md-6 mb-3">
                    {{field.label_tag}}
                    {{field}}
                    {%if field.errors%}
                    <div class="text-danger">{{field.errors}}</div>
                    {%endif%}
                </div>
                {%endfor%}
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save me-2"></i>Save
            </button>
        </form>
    </div>
</div>
{%endblock%}
